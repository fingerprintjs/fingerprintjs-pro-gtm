name: Update GTM metadata

on:
  release:
    types:
      - published

jobs:
  update-gtm-metadata:
    name: Update GTM metadata with latest SHA and release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update GTM metadata
        env:
          # github.ref_name is the tag name for the triggering event
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: pnpm exec tsx scripts/updateMetadata "$GITHUB_REF_NAME"

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update GTM metadata for ${{ github.ref_name }}"
          branch: chore/update-gtm-metadata
          delete-branch: true
          title: "chore: update GTM metadata for ${{ github.ref_name }}"
          body: |
            Update the `metadata.yaml` file to add the SHA and release notes for the `${{ github.ref_name }}` version.

            *This PR was automatically created by the [Update GTM metadata workflow](${{ github.server_url }}/${{ github.repository }}/.github/workflows/update-gtm-metadata.yml)*


